name: Wealth Insights Global Autoposter

on:
  workflow_dispatch:
    inputs:
      post_index:
        description: "Post index (0-49)"
        required: false
        default: "0"
  schedule:
    - cron: "0 6 * * *"
    - cron: "29 6 * * *"
    - cron: "58 6 * * *"
    - cron: "27 7 * * *"
    - cron: "56 7 * * *"
    - cron: "25 8 * * *"
    - cron: "54 8 * * *"
    - cron: "23 9 * * *"
    - cron: "52 9 * * *"
    - cron: "21 10 * * *"
    - cron: "50 10 * * *"
    - cron: "19 11 * * *"
    - cron: "48 11 * * *"
    - cron: "17 12 * * *"
    - cron: "46 12 * * *"
    - cron: "15 13 * * *"
    - cron: "44 13 * * *"
    - cron: "13 14 * * *"
    - cron: "42 14 * * *"
    - cron: "11 15 * * *"
    - cron: "40 15 * * *"
    - cron: "9 16 * * *"
    - cron: "38 16 * * *"
    - cron: "7 17 * * *"
    - cron: "36 17 * * *"
    - cron: "5 18 * * *"
    - cron: "34 18 * * *"
    - cron: "3 19 * * *"
    - cron: "32 19 * * *"
    - cron: "1 20 * * *"
    - cron: "30 20 * * *"
    - cron: "59 20 * * *"
    - cron: "28 21 * * *"
    - cron: "57 21 * * *"
    - cron: "26 22 * * *"
    - cron: "55 22 * * *"
    - cron: "24 23 * * *"
    - cron: "53 23 * * *"
    - cron: "22 0 * * *"
    - cron: "51 0 * * *"
    - cron: "20 1 * * *"
    - cron: "49 1 * * *"
    - cron: "18 2 * * *"
    - cron: "47 2 * * *"
    - cron: "16 3 * * *"
    - cron: "45 3 * * *"
    - cron: "14 4 * * *"
    - cron: "43 4 * * *"
    - cron: "12 5 * * *"
    - cron: "41 5 * * *"

jobs:
  autopost:
    runs-on: ubuntu-latest
    env:
      FB_ACCESS_TOKEN_1: ${{ secrets.FB_ACCESS_TOKEN_1 }}
      FB_ACCESS_TOKEN_2: ${{ secrets.FB_ACCESS_TOKEN_2 }}
      FB_ACCESS_TOKEN_3: ${{ secrets.FB_ACCESS_TOKEN_3 }}
      FB_PAGE_ID_1: ${{ secrets.FB_PAGE_ID_1 }}
      FB_PAGE_ID_2: ${{ secrets.FB_PAGE_ID_2 }}
      FB_PAGE_ID_3: ${{ secrets.FB_PAGE_ID_3 }}
      LI_ACCESS_TOKEN: ${{ secrets.LI_ACCESS_TOKEN }}
      LI_PERSON_URN: ${{ secrets.LI_PERSON_URN }}
      TW_API_KEY: ${{ secrets.TW_API_KEY }}
      TW_API_SECRET: ${{ secrets.TW_API_SECRET }}
      TW_ACCESS_TOKEN: ${{ secrets.TW_ACCESS_TOKEN }}
      TW_ACCESS_SECRET: ${{ secrets.TW_ACCESS_SECRET }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests tweepy

      - name: Set post index
        run: |
          INDEX=${{ github.event.inputs.post_index || 0 }}
          echo "POST_INDEX=$INDEX" >> $GITHUB_ENV

      - name: Run autoposter
        run: python autopost.py
